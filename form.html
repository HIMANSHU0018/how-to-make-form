<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <legend> Personal Details </legend>
    <fieldset>
        <div>
            <label>First name </label>
        <input type="text"/> 
        </div>
    </br>
    <div>
        <label>Middle Name : </label>
        <input type="text"/> 
    </div>
</br>
      <div>
        <label>Last Name : </label>
        <input type="text"/> 
      </div>  
    </br>
    <div>
        <label>Course :</label>
        <select> 
            <option>B.E</option>
            <option>MBA</option>
            <option>MCA</option>
            <option>Accounts</option>
        </select>
    </div>
</br>
<div>
    <label>Gender :</label>
</br>
    <input type="radio" value="male" name="Gender"/>
    <label>Male</label>
</br> 
    <input type="radio" value="female" name="Gender"/>
    <label>Female</label> 
</br>
    <input type="radio" value="Others" name="Gender"/>
    <label>Others</label> 
</div>
</br>
<div>
    <label for="Birth" >D.O.B</label>
    <input type="datetime-local" value="date" name="Birth"/>
</div>
<div>
    <label for="mob-num">Phone Number</label>
    <input type="number" placeholder="Phone Number" name="mob-num" maxlength="13" minlength="10"/>
</div>
</br>
<div>
    <label for="suchna">Address</label>
    <textarea></textarea>
</div>
</br>
<div>
    <label for="mail">Email :</label>
    <input type="email" placeholder="Type your Mail Id" name="mail"/>
</div>
</br>
<div>
    <label for="psw">Password :</label>
    <input type="Password" placeholder="Enter Your Password" name="psw"/>  
</div>
</br>
<div>
    <label for="re-psw">Password :</label>
    <input type="Password" placeholder="Renter your Password" name="re-psw"/> 
</div>
</br>
<div>
    <input type="checkbox" name="data"/>
    <label for="data">Agree to terms and Conditions</label>
</div>
</br>
<div>
    <label for="attachment">Choose file :</label>
    <input type="file" name="attachment"/>
</div>
</br>
<div>
    <label>Choose color</label>
    <input type="color"/>
</div>
</br>
<div>
    <button type="reset">Reset</button>
    <button type="submit">Submit</button>
</div>
    </fieldset> 
    </form>
</body>
</html>
